<!-- Home page modern styles -->
<style>
/* ── News section ── */
.home-news { margin: 2em 0; }
.home-news h2 { font-size: 1.15em; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: #2a2a2a; border-bottom: 2px solid #e5e7eb; padding-bottom: .35em; margin-bottom: 1em; }
.news-list { list-style: none; padding: 0; margin: 0; }
.news-list li { display: flex; gap: .75em; align-items: baseline; padding: .45em 0; border-bottom: 1px dashed #e5e7eb; font-size: .88em; line-height: 1.45; }
.news-list li:last-child { border-bottom: none; }
.news-date { flex-shrink: 0; color: #6b7280; font-variant-numeric: tabular-nums; min-width: 7em; font-size: .83em; }
.news-dot { flex-shrink: 0; width: 7px; height: 7px; border-radius: 50%; background: #2563eb; margin-top: .42em; }

/* ── Paper cards ── */
.home-papers { margin: 2.2em 0; }
.home-papers h2 { font-size: 1.15em; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: #2a2a2a; border-bottom: 2px solid #e5e7eb; padding-bottom: .35em; margin-bottom: 1em; }
.paper-card { display: flex; gap: 1em; padding: 1em 0; border-bottom: 1px solid #f0f0f0; }
.paper-card:last-child { border-bottom: none; }
.paper-card-body { flex: 1; }
.paper-title { font-size: .95em; font-weight: 600; color: #1a1a1a; margin: 0 0 .3em; line-height: 1.4; }
.paper-title a { color: inherit; text-decoration: none; }
.paper-title a:hover { color: #2563eb; }
.paper-authors { font-size: .8em; color: #555; margin: 0 0 .4em; }
.paper-authors strong { color: #1a1a1a; }
.paper-venue-row { display: flex; align-items: center; flex-wrap: wrap; gap: .4em; margin-bottom: .45em; }
.badge { display: inline-block; padding: .15em .55em; border-radius: 4px; font-size: .73em; font-weight: 700; letter-spacing: .02em; white-space: nowrap; }
.badge-acl    { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.badge-naacl  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.badge-ieee   { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
.badge-journal{ background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.badge-chapter{ background: #faf5ff; color: #7e22ce; border: 1px solid #e9d5ff; }
.badge-arxiv  { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
.badge-award  { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
.paper-links { display: flex; gap: .5em; flex-wrap: wrap; }
.paper-links a { font-size: .76em; padding: .18em .55em; border-radius: 4px; border: 1px solid #d1d5db; color: #374151; text-decoration: none; transition: all .15s; }
.paper-links a:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

/* ── Research interests tags ── */
.interest-tags { display: flex; flex-wrap: wrap; gap: .5em; margin: .6em 0 1.4em; }
.interest-tag { background: #f1f5f9; color: #334155; font-size: .8em; padding: .25em .7em; border-radius: 20px; border: 1px solid #e2e8f0; }

/* ── Section header (reusable) ── */
.section-h { font-size: 1.15em; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: #2a2a2a; border-bottom: 2px solid #e5e7eb; padding-bottom: .35em; margin: 2em 0 1em; }
</style>
